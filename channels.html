<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SILBERO DIGITAL // CHANNELS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      color: #888;
      font-family: 'Courier New', Courier, monospace;
      font-size: 12px;
      height: 100vh;
      overflow-y: auto;
      overflow-x: hidden;
    }

    #channels {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      gap: 0;
      padding: 2px;
    }

    /* Channel group: permanent base lane + dynamic source lanes */
    .ch-group {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .ch-lane {
      display: flex;
      align-items: center;
      gap: 0;
      background: #040404;
      border: 1px solid #0a0a0a;
      overflow: hidden;
      position: relative;
      height: 44px;
      flex-shrink: 0;
    }

    /* Channel label — always visible, steady appearance */
    .ch-label {
      width: 52px;
      flex-shrink: 0;
      text-align: center;
      font-size: 10px;
      font-weight: bold;
      letter-spacing: 2px;
      color: #aaa;
      border-right: 1px solid #1a1a1a;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Signal active: label text turns green, nothing else changes */
    .ch-label.signal {
      color: #0c0;
      transition: color 0.05s;
    }

    /* Holzer scrolling area */
    .ch-scroll {
      flex: 1;
      height: 100%;
      position: relative;
      overflow: hidden;
    }

    /* Ticker phrase */
    .ch-ticker {
      position: absolute;
      top: 50%;
      white-space: nowrap;
      font-size: 28px;
      letter-spacing: 4px;
      padding: 0 16px;
      will-change: transform;
    }

    .ch-sender {
      color: #222;
      font-size: 11px;
      letter-spacing: 1px;
      margin-right: 6px;
    }

    /* Characters */
    .ch-char {
      color: #0a0a0a;
      text-shadow: none;
      transition: none;
    }

    .ch-char.hit {
      color: #fff;
      text-shadow: 0 0 16px rgba(255,255,255,0.9), 0 0 4px rgba(255,255,255,1);
      transition: none;
    }

    .ch-char.lit {
      color: #999;
      text-shadow: 0 0 6px rgba(255,255,255,0.2);
      transition: color 0.4s, text-shadow 0.4s;
    }

    .ch-char.spent {
      color: #222;
      text-shadow: none;
      transition: color 1.2s, text-shadow 0.6s;
    }

    /* Muted characters: identical to active, just not bold */
    .ch-char.muted {
      color: #0a0a0a;
    }

    /* Active characters get bold when lit */
    .ch-char.hit,
    .ch-char.lit {
      font-weight: bold;
    }

    /* Note flash indicator (bass/drums) */
    .ch-note-flash {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 10px;
      color: #444;
      letter-spacing: 1px;
      z-index: 2;
    }

    /* Channel accent colors — left border (always visible) */
    .ch-group[data-ch="0"] .ch-lane { border-left: 2px solid #444; }
    .ch-group[data-ch="1"] .ch-lane { border-left: 2px solid #446; }
    .ch-group[data-ch="2"] .ch-lane { border-left: 2px solid #464; }
    .ch-group[data-ch="3"] .ch-lane { border-left: 2px solid #644; }
    .ch-group[data-ch="4"] .ch-lane { border-left: 2px solid #466; }
    .ch-group[data-ch="5"] .ch-lane { border-left: 2px solid #646; }
    .ch-group[data-ch="6"] .ch-lane { border-left: 2px solid #664; }
    .ch-group[data-ch="7"] .ch-lane { border-left: 2px solid #555; }
    .ch-group[data-ch="bass"] .ch-lane { border-left: 2px solid #636; }
    .ch-group[data-ch="drums"] .ch-lane { border-left: 2px solid #663; }

    /* Per-channel hit flash colors */
    .ch-group[data-ch="0"] .ch-char.hit { color: #fff; text-shadow: 0 0 18px #fff, 0 0 4px #fff; }
    .ch-group[data-ch="1"] .ch-char.hit { color: #ddf; text-shadow: 0 0 18px #aaf, 0 0 4px #bbf; }
    .ch-group[data-ch="2"] .ch-char.hit { color: #dfd; text-shadow: 0 0 18px #afa, 0 0 4px #bfb; }
    .ch-group[data-ch="3"] .ch-char.hit { color: #fdd; text-shadow: 0 0 18px #faa, 0 0 4px #fbb; }
    .ch-group[data-ch="4"] .ch-char.hit { color: #dff; text-shadow: 0 0 18px #aff, 0 0 4px #bff; }
    .ch-group[data-ch="5"] .ch-char.hit { color: #fdf; text-shadow: 0 0 18px #faf, 0 0 4px #fbf; }
    .ch-group[data-ch="6"] .ch-char.hit { color: #ffd; text-shadow: 0 0 18px #ffa, 0 0 4px #ffb; }
    .ch-group[data-ch="7"] .ch-char.hit { color: #fff; text-shadow: 0 0 18px #ddd, 0 0 4px #ccc; }

    /* Per-channel settled glow colors */
    .ch-group[data-ch="0"] .ch-char.lit { color: #999; text-shadow: 0 0 6px rgba(255,255,255,0.2); }
    .ch-group[data-ch="1"] .ch-char.lit { color: #88a; text-shadow: 0 0 6px rgba(140,140,200,0.2); }
    .ch-group[data-ch="2"] .ch-char.lit { color: #8a8; text-shadow: 0 0 6px rgba(140,200,140,0.2); }
    .ch-group[data-ch="3"] .ch-char.lit { color: #a88; text-shadow: 0 0 6px rgba(200,140,140,0.2); }
    .ch-group[data-ch="4"] .ch-char.lit { color: #8aa; text-shadow: 0 0 6px rgba(140,200,200,0.2); }
    .ch-group[data-ch="5"] .ch-char.lit { color: #a8a; text-shadow: 0 0 6px rgba(200,140,200,0.2); }
    .ch-group[data-ch="6"] .ch-char.lit { color: #aa8; text-shadow: 0 0 6px rgba(200,200,140,0.2); }
    .ch-group[data-ch="7"] .ch-char.lit { color: #999; text-shadow: 0 0 6px rgba(180,180,180,0.2); }

    /* Scan lines */
    .ch-lane::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.05) 2px, rgba(0,0,0,0.05) 4px
      );
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="channels"></div>

  <script>
    const elChannels = document.getElementById('channels');

    const channelDefs = [
      { id: '0', label: 'CH 1' }, { id: '1', label: 'CH 2' },
      { id: '2', label: 'CH 3' }, { id: '3', label: 'CH 4' },
      { id: '4', label: 'CH 5' }, { id: '5', label: 'CH 6' },
      { id: '6', label: 'CH 7' }, { id: '7', label: 'CH 8' },
      { id: 'bass', label: 'BASS' }, { id: 'drums', label: 'DRUM' },
    ];

    const groups = {};    // chId -> { el, def, baseLane, baseLabel }
    const sources = {};   // "chId:sourceId" -> { lane, label, scroll, noteFlash, charTimers }
    const signalTimers = {}; // chId -> timeout for green label

    // Build all channel groups with a permanent base lane
    for (const def of channelDefs) {
      const group = document.createElement('div');
      group.className = 'ch-group';
      group.dataset.ch = def.id;

      // Permanent base lane — always visible
      const baseLane = document.createElement('div');
      baseLane.className = 'ch-lane';

      const baseLabel = document.createElement('div');
      baseLabel.className = 'ch-label';
      baseLabel.textContent = def.label;

      const baseScroll = document.createElement('div');
      baseScroll.className = 'ch-scroll';

      const baseFlash = document.createElement('div');
      baseFlash.className = 'ch-note-flash';

      baseLane.appendChild(baseLabel);
      baseLane.appendChild(baseScroll);
      baseLane.appendChild(baseFlash);
      group.appendChild(baseLane);
      elChannels.appendChild(group);

      groups[def.id] = { el: group, def, baseLane, baseLabel, baseScroll, baseFlash };
    }

    /**
     * Get or create a source lane for a specific source on a channel.
     * First source reuses the base lane. Additional sources create new lanes below.
     */
    function getSourceLane(chId, sourceId) {
      const key = chId + ':' + sourceId;
      if (sources[key]) return sources[key];

      const group = groups[chId];
      if (!group) return null;

      // Check if the base lane is unclaimed
      const baseKey = chId + ':__base__';
      if (!sources[baseKey]) {
        // First source: use the base lane
        sources[baseKey] = true; // mark claimed
        const entry = {
          lane: group.baseLane,
          label: group.baseLabel,
          scroll: group.baseScroll,
          noteFlash: group.baseFlash,
          charTimers: [],
          sourceId,
        };
        sources[key] = entry;
        return entry;
      }

      // Additional source: create a new lane below
      const lane = document.createElement('div');
      lane.className = 'ch-lane';

      const label = document.createElement('div');
      label.className = 'ch-label';
      label.textContent = group.def.label;

      const scroll = document.createElement('div');
      scroll.className = 'ch-scroll';

      const noteFlash = document.createElement('div');
      noteFlash.className = 'ch-note-flash';

      lane.appendChild(label);
      lane.appendChild(scroll);
      lane.appendChild(noteFlash);
      group.el.appendChild(lane);

      const entry = { lane, label, scroll, noteFlash, charTimers: [], sourceId, dynamic: true };
      sources[key] = entry;
      return entry;
    }

    /**
     * Turn the channel label text green on signal, revert after 300ms of silence.
     */
    function signalChannel(chId) {
      const group = groups[chId];
      if (!group) return;

      // Turn ALL labels in this group green
      group.el.querySelectorAll('.ch-label').forEach(l => l.classList.add('signal'));

      // Clear previous revert timer
      if (signalTimers[chId]) clearTimeout(signalTimers[chId]);

      // Revert to default after 300ms of no signal
      signalTimers[chId] = setTimeout(() => {
        group.el.querySelectorAll('.ch-label').forEach(l => l.classList.remove('signal'));
      }, 300);
    }

    // Listen for events from the operator console
    const bc = new BroadcastChannel('silbero-viz');

    bc.onmessage = (e) => {
      const msg = e.data;
      switch (msg.type) {
        case 'note':
          holzerScroll(String(msg.channel), String(msg.sourceId),
            msg.displayText || msg.text, msg.activeText || msg.text,
            msg.durationMs, msg.name);
          break;
        case 'tick':
          signalChannel(String(msg.channel));
          break;
        case 'bass':
          signalChannel('bass');
          flashNote('bass', 'engine', midiNoteName(msg.midiNote));
          break;
        case 'drum':
          signalChannel('drums');
          flashNote('drums', 'engine', msg.percType.toUpperCase());
          break;
        case 'stop':
          stopSource(String(msg.channel), String(msg.sourceId));
          break;
      }
    };

    /**
     * Flash a note name in a source lane (bass/drums).
     */
    function flashNote(chId, sourceId, label) {
      const src = getSourceLane(chId, sourceId);
      if (!src) return;
      src.noteFlash.textContent = label;
      setTimeout(() => { src.noteFlash.textContent = ''; }, 200);
    }

    /**
     * Holzer scroll: text enters right, scrolls left, characters flash
     * as their MIDI note fires. Never clears. Loops overlap.
     */
    /**
     * @param {string} displayText - Full original text (always shown for readability)
     * @param {string} activeText  - Thinned text after density (which chars trigger notes)
     */
    function holzerScroll(chId, sourceId, displayText, activeText, durationMs, senderName) {
      const src = getSourceLane(chId, sourceId);
      if (!src) return;

      for (const t of src.charTimers) clearTimeout(t);
      src.charTimers = [];

      const container = src.scroll;
      const containerWidth = container.offsetWidth || 800;

      // Build ticker with ALL characters visible
      const ticker = document.createElement('div');
      ticker.className = 'ch-ticker';

      const tag = document.createElement('span');
      tag.className = 'ch-sender';
      tag.textContent = senderName;
      ticker.appendChild(tag);

      // Render every character from displayText.
      // Mark each as 'active' or 'muted' based on whether activeText
      // has a non-space character at that position.
      const charSpans = [];
      for (let i = 0; i < displayText.length; i++) {
        const span = document.createElement('span');
        const isActive = activeText[i] && activeText[i] !== ' ' && displayText[i] !== ' ';
        span.className = isActive ? 'ch-char' : 'ch-char muted';
        span.textContent = displayText[i];
        ticker.appendChild(span);
        charSpans.push({ span, active: isActive });
      }

      container.appendChild(ticker);

      const textWidth = ticker.offsetWidth || (displayText.length * 24);
      const scrollDuration = durationMs * 1.5;
      const startX = containerWidth;
      const endX = -textWidth;

      ticker.style.transition = 'none';
      ticker.style.transform = `translate(${startX}px, -50%)`;
      ticker.offsetWidth;
      ticker.style.transition = `transform ${scrollDuration}ms linear`;
      ticker.style.transform = `translate(${endX}px, -50%)`;

      // Light up characters in sequence — active ones flash,
      // muted ones get the same colors (just have strikethrough)
      const msPerChar = durationMs / Math.max(1, displayText.length);
      for (let i = 0; i < charSpans.length; i++) {
        const { span, active } = charSpans[i];
        const timer = setTimeout(() => {
          if (active) {
            // Active: bright flash then glow
            span.classList.add('hit');
            setTimeout(() => {
              span.classList.remove('hit');
              span.classList.add('lit');
            }, 60);
          } else {
            // Muted: same color progression, no flash — just appear as lit
            span.classList.add('lit');
          }
        }, i * msPerChar);
        src.charTimers.push(timer);
      }

      // Afterglow
      const doneTimer = setTimeout(() => {
        for (const { span } of charSpans) {
          span.classList.remove('lit', 'hit');
          span.classList.add('spent');
        }
      }, durationMs + 200);
      src.charTimers.push(doneTimer);

      setTimeout(() => {
        if (ticker.parentNode) ticker.remove();
      }, scrollDuration + 500);

      const tickers = container.querySelectorAll('.ch-ticker');
      if (tickers.length > 6) tickers[0].remove();
    }

    /**
     * Stop a source — fade out and optionally remove dynamic lane.
     */
    function stopSource(chId, sourceId) {
      const key = chId + ':' + sourceId;
      const src = sources[key];
      if (!src) return;

      for (const t of src.charTimers) clearTimeout(t);
      src.charTimers = [];

      // Fade existing text
      const phrase = src.scroll.querySelector('.ch-ticker');
      if (phrase) {
        phrase.classList.add('fading');
        setTimeout(() => { src.scroll.innerHTML = ''; }, 1200);
      }

      // Remove dynamic (extra) lanes after content clears, but keep the base
      if (src.dynamic) {
        setTimeout(() => {
          if (src.lane.parentNode) src.lane.remove();
          delete sources[key];
        }, 2000);
      }
    }

    function midiNoteName(midi) {
      const names = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
      return names[midi % 12] + (Math.floor(midi / 12) - 1);
    }
  </script>
</body>
</html>
