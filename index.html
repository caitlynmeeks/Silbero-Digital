<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SILBO TERMINAL</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="terminal">
    <div id="header">
      <span id="terminal-id">TERMINAL --</span>
      <span id="status">OFFLINE</span>
      <button id="btn-config" class="header-btn">CONFIG</button>
    </div>

    <div id="config-panel" class="hidden">
      <div class="config-row">
        <label>Terminal ID (1-5):</label>
        <input type="number" id="input-terminal-id" min="1" max="5" value="1">
      </div>
      <div class="config-row">
        <label>Listen to terminals:</label>
        <div id="listen-checkboxes"></div>
      </div>
      <div class="config-row">
        <button id="btn-printer">CONNECT PRINTER</button>
        <span id="printer-status">NO PRINTER</span>
      </div>
      <div class="config-row">
        <button id="btn-start">START</button>
      </div>
    </div>

    <div id="main-area">
      <div id="visual-panel">
        <canvas id="glitch-canvas" width="400" height="300"></canvas>
      </div>
      <div id="messages"></div>
    </div>

    <div id="input-area">
      <span id="prompt">&gt; </span>
      <input type="text" id="input" maxlength="80" autocomplete="off" spellcheck="false"
             placeholder="type message, press enter to transmit">
    </div>

    <div id="vu-meter">
      <canvas id="spectrogram" width="600" height="80"></canvas>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
